<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACCION</title>
<!-- v3 -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ACCION">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--bg1:#111;--bg2:#1a1a1a;--border:#222;
  --text:#e5e5e5;--dim:#888;--dimmer:#555;
  --accent:#3b82f6;--accent-glow:rgba(59,130,246,.25);
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'JetBrains Mono',Consolas,'Courier New',monospace;
  background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;
}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#555}

/* TOP BAR */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  height:44px;padding:0 16px;border-bottom:1px solid var(--border);
  background:var(--bg1);flex-shrink:0;z-index:50;position:relative;
}
.topbar-left{display:flex;align-items:center;gap:12px}
.app-name{font-size:14px;font-weight:600;letter-spacing:3px;color:var(--accent)}
.btn-add-project{
  background:none;border:1px solid var(--border);color:var(--dim);
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  border-radius:4px;cursor:pointer;font-size:14px;transition:all .15s;
}
.btn-add-project:hover{border-color:var(--accent);color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:12px}
.user-info{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim)}
.user-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover}
.btn-icon{
  background:none;border:none;color:var(--dimmer);cursor:pointer;
  font-size:14px;padding:4px;transition:color .15s;display:flex;align-items:center;
}
.btn-icon:hover{color:var(--text)}
#google-signin-btn{cursor:pointer}
#google-signin-btn .g-btn{
  background:var(--bg2);border:1px solid var(--border);color:var(--dim);
  padding:4px 12px;border-radius:4px;font-family:inherit;font-size:11px;
  cursor:pointer;transition:all .15s;
}
#google-signin-btn .g-btn:hover{border-color:var(--accent);color:var(--text)}

/* CANVAS */
.canvas-wrap{
  position:relative;width:100%;height:calc(100vh - 44px);overflow:hidden;
  cursor:grab;
}
.canvas-wrap.panning{cursor:grabbing}
.canvas{
  position:absolute;top:0;left:0;width:1px;height:1px;
  transform-origin:0 0;
}

/* PROJECT CARDS */
.project-col{
  position:absolute;
  width:270px;
  background:var(--bg1);border:1px solid var(--border);border-radius:6px;
  display:flex;flex-direction:column;
  transition:border-color .2s,box-shadow .2s;
  resize:both;overflow:hidden;min-width:200px;max-width:600px;min-height:80px;
  z-index:1;
}
.project-col:hover{border-color:#333}
.project-col.card-dragging{
  opacity:.85;z-index:10;box-shadow:0 8px 32px rgba(0,0,0,.5);
  cursor:grabbing;
}
.project-header{
  padding:10px 12px 8px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);flex-shrink:0;
  cursor:grab;position:relative;
}
.project-col.card-dragging .project-header{cursor:grabbing}
.project-col>.project-color-bar{position:absolute;top:0;left:0;bottom:0;width:3px;z-index:1;border-radius:3px 0 0 3px}
.project-name{font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.color-dot{
  width:10px;height:10px;min-width:10px;border-radius:50%;cursor:pointer;
  transition:transform .15s,box-shadow .15s;border:none;background:currentColor;padding:0;
}
.color-dot:hover{transform:scale(1.3);box-shadow:0 0 6px currentColor}
.color-popover{
  position:fixed;z-index:200;
  background:var(--bg1);border:1px solid var(--border);border-radius:6px;
  padding:8px;display:flex;flex-wrap:wrap;gap:5px;width:180px;
  opacity:0;pointer-events:none;transition:opacity .12s;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.color-popover.active{opacity:1;pointer-events:all}
.color-popover .color-swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s}
.color-popover .color-swatch:hover{border-color:#fff;transform:scale(1.15)}
.color-popover .pop-label{font-size:9px;color:#555;width:100%;letter-spacing:1px;margin:4px 0 2px}
.color-popover .bg-swatch{
  width:20px;height:20px;border-radius:4px;cursor:pointer;
  border:2px solid transparent;transition:all .12s;
}
.color-popover .bg-swatch:hover{border-color:#fff;transform:scale(1.15)}
.color-popover .bg-swatch.active-bg{border-color:var(--accent)}
.color-popover .bg-crazy{
  width:20px;height:20px;border-radius:4px;cursor:pointer;
  border:2px solid transparent;transition:all .12s;
  background:linear-gradient(135deg,#ef4444,#f59e0b,#10b981,#3b82f6,#8b5cf6,#ec4899);
  background-size:300% 300%;
  animation:crazy-swatch 2s ease infinite;
}
.color-popover .bg-crazy:hover{border-color:#fff;transform:scale(1.15)}
.color-popover .bg-crazy.active-bg{border-color:var(--accent)}

@keyframes crazy-swatch{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
@keyframes crazy-bg{
  0%{background-position:0% 50%}
  25%{background-position:100% 0%}
  50%{background-position:100% 100%}
  75%{background-position:0% 100%}
  100%{background-position:0% 50%}
}
.project-col.crazy-bg{
  background:linear-gradient(135deg,
    rgba(239,68,68,.12),
    rgba(245,158,11,.12),
    rgba(16,185,129,.12),
    rgba(59,130,246,.12),
    rgba(139,92,246,.12),
    rgba(236,72,153,.12)
  ) !important;
  background-size:400% 400% !important;
  animation:crazy-bg 6s ease infinite;
  border-color:#333 !important;
}
.progress-bar{
  height:2px;border-radius:1px;background:rgba(255,255,255,.06);
  margin:0 12px;flex-shrink:0;overflow:hidden;
}
.progress-fill{height:100%;border-radius:1px;transition:width .3s ease}
.project-actions{display:flex;gap:4px}
.btn-delete-project{
  background:none;border:none;color:var(--dimmer);cursor:pointer;
  font-size:12px;opacity:0;transition:all .15s;padding:2px;
}
.project-col:hover .btn-delete-project{opacity:1}
.btn-delete-project:hover{color:#ef4444}
.btn-minimize{
  background:none;border:none;color:var(--dimmer);cursor:pointer;
  font-size:10px;opacity:0;transition:all .15s;padding:2px;
}
.project-col:hover .btn-minimize{opacity:1}
.btn-minimize:hover{color:var(--text)}
.project-col.collapsed .progress-bar,
.project-col.collapsed .task-list,
.project-col.collapsed .add-task-wrap{display:none}
.project-col.collapsed{min-height:0;resize:none;overflow:hidden}
.project-col.collapsed .project-header{border-bottom:none}

/* TASK LIST */
.task-list{padding:6px 0}
.task-item{
  display:flex;align-items:center;gap:6px;padding:4px 12px 4px 16px;
  transition:background .1s;position:relative;
}
.task-item:hover{background:rgba(255,255,255,.02)}
.task-checkbox{
  appearance:none;-webkit-appearance:none;width:14px;height:14px;min-width:14px;
  border:1px solid #444;border-radius:3px;cursor:pointer;
  background:transparent;transition:all .15s;position:relative;flex-shrink:0;
}
.task-checkbox:checked{background:var(--accent);border-color:var(--accent)}
.task-checkbox:checked::after{
  content:'';position:absolute;top:1px;left:4px;width:4px;height:7px;
  border:solid #fff;border-width:0 1.5px 1.5px 0;transform:rotate(45deg);
}
.task-checkbox:hover{border-color:var(--accent)}
/* Priority indicator - right of checkbox */
.task-priority-indicator{
  width:6px;height:6px;min-width:6px;border-radius:50%;flex-shrink:0;
}
.task-text{
  flex:1;font-size:12px;color:var(--text);transition:all .2s;
  word-break:break-word;
}
.task-item.done .task-text{
  text-decoration:line-through;opacity:.35;color:var(--dim);
}
/* Priority dots - only show on hover when NO priority set */
.priority-dots{
  display:flex;gap:3px;align-items:center;opacity:0;transition:opacity .1s;
  flex-shrink:0;padding-left:4px;
}
.task-item:hover .priority-dots.no-priority{opacity:1}
.priority-dot{
  width:7px;height:7px;min-width:7px;border-radius:50%;cursor:pointer;
  border:none;padding:0;transition:transform .12s;
}
.priority-dot:hover{transform:scale(1.6)}
.priority-dot[data-p="today"]{background:#ef4444}
.priority-dot[data-p="normal"]{background:#f97316}
.priority-dot[data-p="low"]{background:#eab308}
.task-delete{
  background:none;border:none;color:var(--dimmer);cursor:pointer;
  font-size:11px;opacity:0;transition:opacity .1s;padding:2px;
  flex-shrink:0;
}
.task-item:hover .task-delete{opacity:1}
.task-delete:hover{color:#ef4444}

/* ADD TASK INPUT */
.add-task-wrap{padding:6px 12px 10px 16px;flex-shrink:0}
.add-task-input{
  width:100%;background:none;border:none;border-bottom:1px solid var(--border);
  color:var(--text);font-family:inherit;font-size:12px;padding:4px 0;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.add-task-input::placeholder{color:var(--dimmer);font-size:11px}
.add-task-input:focus{
  border-color:var(--accent);box-shadow:0 1px 0 0 var(--accent-glow);
}

/* TODAY CARD - prominent, always top-left */
.today-card{
  position:absolute;z-index:2;
  background:#141008;border:1px solid #3a2e15;border-radius:6px;
  min-width:260px;max-width:500px;width:300px;
  display:flex;flex-direction:column;
  border-left:3px solid #f59e0b;
  resize:both;overflow:auto;min-height:60px;
  box-shadow:0 0 24px rgba(245,158,11,.1);
}
.today-card.empty{display:none}
.today-header{
  padding:10px 12px 8px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid rgba(245,158,11,.15);cursor:grab;
  background:rgba(245,158,11,.06);
}
.today-label{font-size:14px;font-weight:600;letter-spacing:3px;color:#f59e0b}
.today-count{font-size:10px;color:var(--dim)}
.today-tasks{padding:6px 0}
.today-task-item{
  display:flex;align-items:center;gap:6px;padding:3px 12px 3px 8px;
  font-size:11px;color:var(--text);transition:background .1s;
}
.today-task-item:hover{background:rgba(255,255,255,.02)}
.today-drag-handle{
  cursor:grab;color:var(--dimmer);font-size:10px;padding:0 2px;
  opacity:0;transition:opacity .1s;user-select:none;flex-shrink:0;
}
.today-task-item:hover .today-drag-handle{opacity:1}
.today-task-item.dragging-task{opacity:.4}
.today-task-item.drag-above{box-shadow:0 -1px 0 0 #f59e0b}
.today-task-item.drag-below{box-shadow:0 1px 0 0 #f59e0b}
.today-task-item.done .today-task-text{
  text-decoration:line-through;opacity:.35;color:var(--dim);
}
.today-task-check{
  appearance:none;-webkit-appearance:none;width:12px;height:12px;min-width:12px;
  border:1px solid #444;border-radius:2px;cursor:pointer;
  background:transparent;transition:all .15s;position:relative;flex-shrink:0;
}
.today-task-check:checked{background:#f59e0b;border-color:#f59e0b}
.today-task-check:checked::after{
  content:'';position:absolute;top:0px;left:3px;width:3px;height:6px;
  border:solid #fff;border-width:0 1.5px 1.5px 0;transform:rotate(45deg);
}
.today-project-tag{
  font-size:9px;padding:1px 5px;border-radius:3px;
  background:rgba(255,255,255,.06);margin-left:auto;flex-shrink:0;
}

/* WORKOUT CARD */
.workout-card{
  position:absolute;z-index:2;
  background:#0d1712;border:1px solid #1e3a2a;border-radius:6px;
  width:210px;
  display:flex;flex-direction:column;
  border-left:3px solid #22c55e;
  box-shadow:0 0 24px rgba(34,197,94,.08);
}
.workout-header{
  padding:8px 12px 6px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(34,197,94,.12);cursor:grab;
  background:rgba(34,197,94,.05);gap:8px;
}
.workout-label{font-size:11px;font-weight:600;letter-spacing:2.5px;color:#22c55e}
.workout-streak{font-size:10px;color:var(--dim)}
.workout-body{padding:8px 12px 10px;cursor:pointer;transition:background .12s}
.workout-body:hover{background:rgba(255,255,255,.02)}
.workout-dots{display:flex;gap:4px}
.workout-dot{
  flex:1;height:20px;border-radius:3px;
  background:#1a1a1a;border:1px solid #222;
  transition:all .15s;
}
.workout-dot.yes{background:#22c55e;border-color:#22c55e}
.workout-dot.no{background:#3b1515;border-color:#4a1a1a}
.workout-dot.today{outline:1px solid #22c55e66;outline-offset:1px}
.workout-caption{
  font-size:9px;color:var(--dimmer);margin-top:6px;text-align:center;letter-spacing:1px;
}
.workout-prompt{
  display:flex;align-items:center;gap:6px;
  padding:8px 12px;border-bottom:1px solid rgba(34,197,94,.12);
  background:rgba(34,197,94,.04);
}
.workout-prompt-q{flex:1;font-size:11px;color:var(--text)}
.workout-btn{
  background:var(--bg2);border:1px solid var(--border);color:var(--dim);
  font-family:inherit;font-size:10px;padding:3px 10px;border-radius:3px;
  cursor:pointer;transition:all .12s;
}
.workout-btn:hover{border-color:#444;color:var(--text)}
.workout-btn.yes{background:#22c55e;border-color:#22c55e;color:#fff}
.workout-btn.yes:hover{background:#16a34a;border-color:#16a34a}
.workout-btn.no{background:#3b1515;border-color:#4a1a1a;color:#f87171}
.workout-btn.no:hover{background:#4a1a1a;border-color:#5a2020}

/* ADD PROJECT MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;z-index:100;
  opacity:0;pointer-events:none;transition:opacity .15s;
}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal{
  background:var(--bg1);border:1px solid var(--border);border-radius:8px;
  padding:20px;width:320px;
}
.modal h3{font-size:13px;font-weight:500;margin-bottom:14px;color:var(--text)}
.modal-input{
  width:100%;background:var(--bg);border:1px solid var(--border);
  color:var(--text);font-family:inherit;font-size:12px;padding:8px 10px;
  border-radius:4px;outline:none;margin-bottom:12px;transition:border-color .15s;
}
.modal-input:focus{border-color:var(--accent)}
.color-picker{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.color-swatch{
  width:24px;height:24px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all .15s;
}
.color-swatch:hover,.color-swatch.selected{border-color:#fff;transform:scale(1.15)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-btn{
  background:var(--bg2);border:1px solid var(--border);color:var(--dim);
  font-family:inherit;font-size:11px;padding:6px 14px;border-radius:4px;
  cursor:pointer;transition:all .15s;
}
.modal-btn:hover{border-color:#444;color:var(--text)}
.modal-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.modal-btn.primary:hover{background:#2563eb}

/* SETTINGS DROPDOWN */
.settings-dropdown{
  position:absolute;top:40px;right:12px;background:var(--bg1);
  border:1px solid var(--border);border-radius:6px;padding:6px 0;
  z-index:50;min-width:140px;opacity:0;pointer-events:none;transition:opacity .15s;
}
.settings-dropdown.active{opacity:1;pointer-events:all}
.settings-item{
  padding:6px 14px;font-size:11px;color:var(--dim);cursor:pointer;
  transition:all .1s;display:block;width:100%;text-align:left;
  background:none;border:none;font-family:inherit;
}
.settings-item:hover{background:var(--bg2);color:var(--text)}

/* Canvas dot grid */
.canvas-wrap{
  background-image:radial-gradient(circle,#1a1a1a 1px,transparent 1px);
  background-size:30px 30px;
}

/* ---- MOBILE ---- */
@media(max-width:600px){
  .canvas-wrap{
    overflow-y:auto !important;overflow-x:hidden !important;
    cursor:default;background-image:none;
    -webkit-overflow-scrolling:touch;
  }
  .canvas-wrap.panning{cursor:default}
  .canvas{
    position:relative !important;
    transform:none !important;
    width:100% !important;height:auto !important;
    display:flex;flex-direction:column;gap:12px;
    padding:12px;padding-bottom:80px;
  }
  .project-col{
    position:relative !important;
    left:auto !important;top:auto !important;
    width:100% !important;min-width:0 !important;max-width:100% !important;
    resize:none !important;overflow:hidden;
  }
  .today-card{
    position:relative !important;
    left:auto !important;top:auto !important;
    width:100% !important;min-width:0 !important;max-width:100% !important;
    resize:none !important;order:-1;
  }
  .today-card.empty{display:none}
  .workout-card{
    position:relative !important;
    left:auto !important;top:auto !important;
    width:100% !important;order:-1;
  }
  .topbar{height:40px;padding:0 10px}
  .app-name{font-size:12px;letter-spacing:2px}
  .project-header{cursor:grab}
  .project-col.mobile-dragging{opacity:.4}
  .project-col.mobile-drag-above{border-top:2px solid var(--accent) !important}
  .project-col.mobile-drag-below{border-bottom:2px solid var(--accent) !important}
  .btn-delete-project{opacity:1}
  .btn-minimize{opacity:1}
  .task-delete{opacity:.6}
  .priority-dots.no-priority{opacity:.8}
  .today-drag-handle{opacity:.6}
  .flying-emoji{display:none}
  #btnPip{display:none}
}
/* TOP TABS */
.top-tabs{display:flex;gap:4px;margin-left:8px}
.top-tab{
  background:none;border:1px solid transparent;color:var(--dim);
  font-family:inherit;font-size:11px;letter-spacing:1.5px;
  padding:4px 10px;border-radius:4px;cursor:pointer;
  transition:all .15s;text-transform:uppercase;
}
.top-tab:hover{color:var(--text);border-color:var(--border)}
.top-tab.active{color:var(--accent);border-color:var(--accent);background:rgba(59,130,246,.08)}

/* AI TOOLS VIEW - NODE EDITOR */
.ai-view{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:none;background:#070707;overflow:hidden;
  background-image:radial-gradient(circle,#161616 1px,transparent 1px);
  background-size:24px 24px;
}
.ai-view.active{display:block}
.ai-canvas-wrap{
  position:absolute;inset:0;cursor:grab;overflow:hidden;
}
.ai-canvas-wrap.panning{cursor:grabbing}
.ai-canvas{
  position:absolute;top:0;left:0;width:1px;height:1px;
  transform-origin:0 0;
}
.ai-wires{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;overflow:visible;
}
.ai-node{
  position:absolute;
  background:#111;border:1px solid #2a2a2a;border-radius:8px;
  width:240px;display:flex;flex-direction:column;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
  font-size:11px;color:var(--text);
  transition:border-color .15s,box-shadow .15s;
  z-index:1;
}
.ai-node:hover{border-color:#3a3a3a}
.ai-node.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 4px 20px rgba(59,130,246,.25)}
.ai-node.dragging{opacity:.92;z-index:10}
.ai-node-header{
  padding:8px 12px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid #1f1f1f;cursor:grab;
  border-radius:8px 8px 0 0;
  background:linear-gradient(90deg, var(--node-color, #3b82f6) 0%, transparent 60%);
  background-color:#161616;
}
.ai-node-title{
  font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
  color:#fff;
}
.ai-node-del{
  background:none;border:none;color:#666;cursor:pointer;font-size:13px;
  padding:0 2px;opacity:0;transition:opacity .15s;
}
.ai-node:hover .ai-node-del{opacity:1}
.ai-node-del:hover{color:#ef4444}
.ai-node-body{padding:10px 12px;position:relative}
.ai-node-prompt{
  width:100%;background:#0a0a0a;border:1px solid #222;
  color:var(--text);font-family:inherit;font-size:11px;padding:8px 10px;
  border-radius:4px;outline:none;resize:vertical;min-height:60px;
}
.ai-node-prompt:focus{border-color:var(--accent)}
.ai-node-preview{
  width:100%;min-height:120px;background:#0a0a0a;border:1px dashed #222;
  border-radius:4px;display:flex;align-items:center;justify-content:center;
  color:#444;font-size:10px;letter-spacing:1px;text-transform:uppercase;

}
.ai-node-preview img,.ai-node-preview video{max-width:100%;max-height:200px;border-radius:3px}
.ai-node-info{
  font-size:10px;color:var(--dim);line-height:1.6;
}
.ai-node-info b{color:var(--text);font-weight:500}
.ai-node-run{
  width:100%;background:var(--accent);border:none;color:#fff;
  font-family:inherit;font-size:10px;letter-spacing:1.5px;
  padding:7px 0;border-radius:4px;cursor:pointer;
  margin-top:8px;text-transform:uppercase;transition:background .15s;
}
.ai-node-run:hover{background:#2563eb}

/* PORTS */
.ai-port{
  position:absolute;width:14px;height:14px;border-radius:50%;
  background:#0a0a0a;border:2px solid var(--port-color, #555);
  cursor:crosshair;transition:all .12s;
  z-index:5;
}
.ai-port:hover{transform:scale(1.3);background:var(--port-color, #555)}
.ai-port.input{left:-8px;top:50%;transform:translateY(-50%)}
.ai-port.input:hover{transform:translateY(-50%) scale(1.3)}
.ai-port.output{right:-8px;top:50%;transform:translateY(-50%)}
.ai-port.output:hover{transform:translateY(-50%) scale(1.3)}
.ai-port-label{
  position:absolute;font-size:9px;color:#555;letter-spacing:1px;
  text-transform:uppercase;pointer-events:none;white-space:nowrap;
  top:50%;transform:translateY(-50%);
}
.ai-port.input .ai-port-label{left:14px}
.ai-port.output .ai-port-label{right:14px}

/* Port type colors */
.ai-port.type-text{--port-color:#a78bfa}
.ai-port.type-image{--port-color:#22d3ee}
.ai-port.type-video{--port-color:#f59e0b}

/* Node type accent colors */
.ai-node.type-prompt{--node-color:#a78bfa}
.ai-node.type-image_model{--node-color:#22d3ee}
.ai-node.type-video_model{--node-color:#f59e0b}

/* WIRE STYLE */
.ai-wire{
  fill:none;stroke:#3b82f6;stroke-width:2;
  filter:drop-shadow(0 0 4px rgba(59,130,246,.4));
  pointer-events:stroke;
}
.ai-wire.text{stroke:#a78bfa;filter:drop-shadow(0 0 4px rgba(167,139,250,.4))}
.ai-wire.image{stroke:#22d3ee;filter:drop-shadow(0 0 4px rgba(34,211,238,.4))}
.ai-wire.video{stroke:#f59e0b;filter:drop-shadow(0 0 4px rgba(245,158,11,.4))}
.ai-wire-temp{stroke-dasharray:4 4;opacity:.7}

/* TOOLBAR */
.ai-toolbar{
  position:absolute;left:50%;bottom:24px;transform:translateX(-50%);
  display:flex;gap:6px;background:#111;border:1px solid #2a2a2a;

}
.ai-tool-btn:hover{background:#222;color:var(--text);border-color:#3a3a3a}

.ai-tool-btn[data-type="image_model"] .dot{background:#22d3ee}
.ai-tool-btn[data-type="video_model"] .dot{background:#f59e0b}

/* Hint text */
.ai-hint{
  position:absolute;top:60px;left:50%;transform:translateX(-50%);
  color:#333;font-size:11px;letter-spacing:2px;text-transform:uppercase;
  pointer-events:none;
}

.flying-emoji{

}
@keyframes fly-across{
  0%{transform:translateX(-60px) rotate(0deg)}
  100%{transform:translateX(calc(100vw + 60px)) rotate(360deg)}
}
</style>

<script>
// ---- DATA ----
const PALETTE = [
  '#4a7c9b','#9abfcf','#d6eff5','#e06c52','#2c3e50',
  '#3b82f6','#1e3a5f','#5ba4cf','#a8d8ea','#f4845f',
  '#7ec8e3','#0f4c75','#bce4f0','#d35d47','#1b2838'
];
const BG_PALETTE = [
  '#111111','#1a1a1a','#0d1117','#1c1917','#171717',
  '#141a1f','#1a1520','#191c14','#1f1410','#141a18',
  '#1e1015','#0f1419','#1a170f','#151520','#0a1628'
];

const SEED_DATA = [
  {"id":"s0xaw70ts","name":"GLOOMY LBE","color":"#3b82f6","tasks":[{"id":"8p4fam00i","text":"Arrancar con concepts","done":false,"priority":"today"},{"id":"1096hcv9c","text":"Poner fechas con los french","done":false},{"id":"9g260cows","text":"Hablar con Fer del animatic","done":false,"priority":null}],"x":-96,"y":204},
  {"id":"u06qukvjl","name":"ART TOYS","color":"#e06c52","tasks":[{"id":"eqdfrfc1a","text":"Siempre uno encolado","done":false,"priority":"today"},{"id":"ad04hb0c8","text":"Hacer lista de los que voy a reimprimir","done":false,"priority":"today"},{"id":"724kzrrqh","text":"Pintar uno","done":false,"priority":null}],"x":-92,"y":434,"bg":"#1f1410"},
  {"id":"cv0ymc6me","name":"3DAR EXEC","color":"#d6eff5","x":946,"y":112,"tasks":[{"id":"c9ndf1403","text":"Hablar con Fede sobre Lluvia negra","done":false,"priority":null},{"id":"f5lhku258","text":"Contar a Ger lo de TSB","done":false,"priority":null}]},
  {"id":"92dtqblyd","name":"EGGSCAPE","color":"#7ec8e3","x":946,"y":-47,"tasks":[{"id":"pgnx96m0c","text":"Promptear posters nuevos","done":false,"priority":null},{"id":"5wx2crfit","text":"Hablar con Santi por trailer","done":false,"priority":null}]},
  {"id":"y32rqqmq3","name":"PROTAGONIST","color":"#5ba4cf","x":285,"y":-52,"tasks":[{"id":"bek37tdw7","text":"Actualizar textos de Steam","done":false,"priority":null},{"id":"mwhd0kwk0","text":"Subir trailer nuevo","done":false,"priority":"today"},{"id":"vjr5i1t55","text":"Poner fecha para Andrew","done":false,"priority":null}]},
  {"id":"hbedmsqeq","name":"HIRAKU","color":"#e06c52","x":344,"y":433,"tasks":[{"id":"461b53w1o","text":"Hacer los 3 frames de las canciones","done":false,"priority":null}],"bg":"#1f1410"},
  {"id":"e71xiubee","name":"NATURIS","color":"#4a7c9b","x":284,"y":139,"tasks":[{"id":"63j25mq98","text":"Actualizar concept segun charla","done":false,"priority":"today"}],"bg":"#111111"},
  {"id":"fbps1mw6n","name":"SILENCE BETWEEN","color":"#3b82f6","x":598,"y":-49,"tasks":[{"id":"c41chif81","text":"Cambiar tapa","done":false,"priority":null},{"id":"zq81s3ssz","text":"Hacer character dev de BLU","done":false,"priority":"today"},{"id":"cn66sn18n","text":"Cambiarle el nombre a BLU","done":false,"priority":null}]},
  {"id":"f7v3k4y08","name":"THERAPY APPS","color":"#3b82f6","x":936,"y":320,"tasks":[{"id":"7ta87nz9i","text":"- ESTOY","done":false,"priority":null},{"id":"23resws89","text":"Enojado","done":false,"priority":null},{"id":"gh6zijx3k","text":"Triste","done":false,"priority":null},{"id":"im3io9ub5","text":"Desconectado","done":false,"priority":null},{"id":"h7lwly7pn","text":"Furioso","done":false,"priority":null},{"id":"5o6smsaiq","text":"Avergonzado","done":false,"priority":null},{"id":"i6yatlx00","text":"No se que me pasa","done":false,"priority":null},{"id":"sy94tp8y6","text":"-----------","done":false,"priority":null},{"id":"6rnwx1phk","text":"Cada una te lleva a un ej distinto con imagenes que explican","done":false,"priority":null}]}
];

function uid(){return Math.random().toString(36).substr(2,9)}

// ---- STATE ----
let projects = loadProjects();
let user = loadUser();
let todayPos = JSON.parse(localStorage.getItem('accion_today_pos'))||{x:20,y:20};
let todayOrder = JSON.parse(localStorage.getItem('accion_today_order'))||[];
let workouts = JSON.parse(localStorage.getItem('accion_workouts'))||{};
let workoutPos = JSON.parse(localStorage.getItem('accion_workout_pos'))||{x:20,y:260};
function saveTodayOrder(){ localStorage.setItem('accion_today_order',JSON.stringify(todayOrder)); }

function loadProjects(){
  const raw = localStorage.getItem('accion_projects');
  if(raw){ try{ return JSON.parse(raw); }catch(e){} }
  return JSON.parse(JSON.stringify(SEED_DATA));
}
function saveProjects(){
  localStorage.setItem('accion_projects', JSON.stringify(projects));
  if(typeof pushToCloud==='function') pushToCloud();
}
function loadUser(){
  const raw = localStorage.getItem('accion_user');
  if(raw){ try{ return JSON.parse(raw); }catch(e){} }
  return null;
}
function saveUser(u){
  user = u;
  localStorage.setItem('accion_user', JSON.stringify(u));
}

// ---- MOBILE DETECT ----
const isMobile = window.matchMedia('(max-width:600px)').matches;

// ---- CANVAS PAN ----
const canvasWrap = document.getElementById('canvasWrap');
const canvas = document.getElementById('canvas');
let panX = 0, panY = 0, zoom = 1;
let isPanning = false, panStartX, panStartY;

// Load saved pan
const savedPan = JSON.parse(localStorage.getItem('accion_pan'));
if(!isMobile && savedPan){panX=savedPan.x;panY=savedPan.y;zoom=savedPan.z||1}
if(!isMobile) updateCanvasTransform();

function updateCanvasTransform(){
  if(isMobile) return;
  canvas.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
}
function savePan(){
  localStorage.setItem('accion_pan',JSON.stringify({x:panX,y:panY,z:zoom}));
}

if(!isMobile){
canvasWrap.addEventListener('pointerdown', e=>{
  if(e.target === canvasWrap || e.target === canvas){
    isPanning = true;
    panStartX = e.clientX - panX;
    panStartY = e.clientY - panY;
    canvasWrap.classList.add('panning');
    canvasWrap.setPointerCapture(e.pointerId);
  }
});
canvasWrap.addEventListener('pointermove', e=>{
  if(!isPanning) return;
  panX = e.clientX - panStartX;
  panY = e.clientY - panStartY;
  updateCanvasTransform();
});
canvasWrap.addEventListener('pointerup', ()=>{
  if(isPanning){isPanning=false;canvasWrap.classList.remove('panning');savePan()}
});
canvasWrap.addEventListener('wheel', e=>{
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.92 : 1.08;
  const newZoom = Math.max(0.3, Math.min(3, zoom * delta));
  const rect = canvasWrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  panX = mx - (mx - panX) * (newZoom / zoom);
  panY = my - (my - panY) * (newZoom / zoom);
  zoom = newZoom;
  updateCanvasTransform();
  savePan();
},{passive:false});

} // end if(!isMobile) for canvas pan/zoom

// ---- CARD DRAGGING ----
let dragCard = null, dragOffX = 0, dragOffY = 0, dragPi = -1;

function startCardDrag(el, pi, e){
  dragCard = el;
  dragPi = pi;
  const rect = el.getBoundingClientRect();
  dragOffX = (e.clientX - rect.left) / zoom;
  dragOffY = (e.clientY - rect.top) / zoom;
  el.classList.add('card-dragging');
  document.addEventListener('pointermove', onCardDrag);
  document.addEventListener('pointerup', onCardDragEnd);
}
function onCardDrag(e){
  if(!dragCard) return;
  const wrapRect = canvasWrap.getBoundingClientRect();
  const rawX = (e.clientX - wrapRect.left - panX) / zoom - dragOffX;
  const rawY = (e.clientY - wrapRect.top - panY) / zoom - dragOffY;
  const x = e.shiftKey ? snap(rawX) : rawX;
  const y = e.shiftKey ? snap(rawY) : rawY;
  dragCard.style.left = x + 'px';
  dragCard.style.top = y + 'px';
}
const GRID = 30;
function snap(v){ return Math.round(v/GRID)*GRID; }

function onCardDragEnd(){
  if(!dragCard) return;
  dragCard.classList.remove('card-dragging');
  const x = parseInt(dragCard.style.left)||0;
  const y = parseInt(dragCard.style.top)||0;
  if(dragPi === -1){
    todayPos = {x,y};
    localStorage.setItem('accion_today_pos',JSON.stringify(todayPos));
  } else if(dragPi === -2){
    workoutPos = {x,y};
    localStorage.setItem('accion_workout_pos',JSON.stringify(workoutPos));
  } else {
    projects[dragPi].x = x;
    projects[dragPi].y = y;
    saveProjects();
  }
  dragCard = null;
  dragPi = -1;
  document.removeEventListener('pointermove', onCardDrag);
  document.removeEventListener('pointerup', onCardDragEnd);
}

// ---- RENDER ----
function render(){
  renderUser();
  renderProjects();
  renderToday();
  renderWorkouts();
}

// ---- WORKOUTS ----
function dateKeyOffset(days){
  const d = new Date();
  d.setDate(d.getDate() - days);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function todayKey(){ return dateKeyOffset(0); }
function saveWorkouts(){
  localStorage.setItem('accion_workouts', JSON.stringify(workouts));
  if(typeof pushToCloud==='function') pushToCloud();
}
function workoutStreak(){
  let streak = 0;
  let start = workouts[todayKey()]==='yes' ? 0 : 1;
  for(let i=start;i<365;i++){
    if(workouts[dateKeyOffset(i)]==='yes') streak++;
    else break;
  }
  return streak;
}
function renderWorkouts(){
  const card = document.getElementById('workoutCard');
  const dots = document.getElementById('workoutDots');
  const streakEl = document.getElementById('workoutStreak');
  const prompt = document.getElementById('workoutPrompt');
  const caption = document.getElementById('workoutCaption');
  card.style.left = workoutPos.x + 'px';
  card.style.top = workoutPos.y + 'px';
  const s = workoutStreak();
  streakEl.textContent = s ? s + 'd streak' : '';
  const todayLogged = todayKey() in workouts;
  prompt.style.display = todayLogged ? 'none' : 'flex';
  caption.textContent = todayLogged ? 'last 7 days · tap to change' : 'last 7 days';
  let html = '';
  for(let i=6;i>=0;i--){
    const key = dateKeyOffset(i);
    const v = workouts[key];
    const cls = (v==='yes'?'yes':v==='no'?'no':'') + (i===0?' today':'');
    html += `<div class="workout-dot ${cls}" title="${key}${v?' · '+v:''}"></div>`;
  }
  dots.innerHTML = html;
  if(!isMobile){
    const hdr = card.querySelector('[data-drag="workout"]');
    hdr.onpointerdown = e => { e.stopPropagation(); startCardDrag(card, -2, e); };
  }
}
function logWorkout(v){
  workouts[todayKey()] = v;
  saveWorkouts();
  renderWorkouts();
}
document.getElementById('workoutYes').addEventListener('click', e=>{ e.stopPropagation(); logWorkout('yes'); });
document.getElementById('workoutNo').addEventListener('click', e=>{ e.stopPropagation(); logWorkout('no'); });
document.getElementById('workoutBody').addEventListener('click', ()=>{
  if(todayKey() in workouts){
    delete workouts[todayKey()];
    saveWorkouts();
    renderWorkouts();
  }
});

function renderToday(){
  const card = document.getElementById('todayCard');
  const container = document.getElementById('todayTasks');
  const countEl = document.getElementById('todayCount');
  // Collect all today items with a stable key
  const rawItems = [];
  projects.forEach((proj,pi)=>{
    proj.tasks.forEach((t,ti)=>{
      if(t.priority==='today') rawItems.push({key:pi+'-'+ti,pi,ti,text:t.text,done:t.done,projName:proj.name,projColor:proj.color});
    });
  });
  if(!rawItems.length){
    card.classList.add('empty');
    todayOrder=[];saveTodayOrder();
    return;
  }
  // Sync todayOrder: keep existing order, append new items, remove stale
  const currentKeys = new Set(rawItems.map(i=>i.key));
  todayOrder = todayOrder.filter(k=>currentKeys.has(k));
  rawItems.forEach(i=>{ if(!todayOrder.includes(i.key)) todayOrder.push(i.key); });
  saveTodayOrder();
  // Sort by todayOrder
  const keyMap = {};
  rawItems.forEach(i=>keyMap[i.key]=i);
  const items = todayOrder.map(k=>keyMap[k]).filter(Boolean);

  card.classList.remove('empty');
  card.style.left = todayPos.x + 'px';
  card.style.top = todayPos.y + 'px';
  const pending = items.filter(i=>!i.done).length;
  countEl.textContent = pending + ' to go';
  container.innerHTML = items.map((it,idx)=>`
    <div class="today-task-item ${it.done?'done':''}" data-idx="${idx}" draggable="true">
      <span class="today-drag-handle">&#8942;</span>
      <input type="checkbox" class="today-task-check" data-pi="${it.pi}" data-ti="${it.ti}" ${it.done?'checked':''}>
      <span class="today-task-text">${esc(it.text)}</span>
      <span class="today-project-tag" style="color:${it.projColor}">${esc(it.projName)}</span>
    </div>
  `).join('');
  // Checkbox events
  container.querySelectorAll('.today-task-check').forEach(cb=>{
    cb.addEventListener('change',e=>{
      const pi=+e.target.dataset.pi, ti=+e.target.dataset.ti;
      projects[pi].tasks[ti].done = e.target.checked;
      saveProjects();
      renderProjects();
      renderToday();
    });
  });
  // Drag reorder within today list
  let dragFromIdx = null;
  const rows = container.querySelectorAll('.today-task-item');
  rows.forEach(row=>{
    row.addEventListener('dragstart',e=>{
      dragFromIdx = +row.dataset.idx;
      row.classList.add('dragging-task');
      e.dataTransfer.effectAllowed='move';
      e.stopPropagation();
    });
    row.addEventListener('dragend',()=>{
      row.classList.remove('dragging-task');
      rows.forEach(r=>{r.classList.remove('drag-above');r.classList.remove('drag-below')});
      dragFromIdx=null;
    });
    row.addEventListener('dragover',e=>{
      e.preventDefault();
      e.stopPropagation();
      if(dragFromIdx===null) return;
      const idx=+row.dataset.idx;
      rows.forEach(r=>{r.classList.remove('drag-above');r.classList.remove('drag-below')});
      if(idx<dragFromIdx) row.classList.add('drag-above');
      else if(idx>dragFromIdx) row.classList.add('drag-below');
    });
    row.addEventListener('dragleave',()=>{
      row.classList.remove('drag-above');row.classList.remove('drag-below');
    });
    row.addEventListener('drop',e=>{
      e.preventDefault();
      e.stopPropagation();
      const toIdx=+row.dataset.idx;
      if(dragFromIdx===null||dragFromIdx===toIdx) return;
      const moved=todayOrder.splice(dragFromIdx,1)[0];
      todayOrder.splice(toIdx,0,moved);
      saveTodayOrder();
      renderToday();
    });
  });
  // Drag today card header (desktop only)
  if(!isMobile){
    card.querySelector('[data-drag="today"]').addEventListener('pointerdown', e=>{
      e.stopPropagation();
      startCardDrag(card, -1, e);
    });
  }
}

function esc(s){

function attachEvents(){
  // Card header drag (desktop only)
  if(!isMobile){
    document.querySelectorAll('.project-header[data-drag]').forEach(hdr=>{
      const pi = +hdr.dataset.drag;
      if(isNaN(pi)) return;
      hdr.addEventListener('pointerdown', e=>{
        if(e.target.closest('.color-dot, .btn-delete-project, .btn-minimize, .color-popover, .color-swatch')) return;
        e.stopPropagation();
        startCardDrag(hdr.closest('.project-col'), pi, e);
      });
      hdr.addEventListener('dblclick', e=>{
        if(e.target.closest('.color-dot, .btn-delete-project, .btn-minimize')) return;
        projects[pi].collapsed = !projects[pi].collapsed;
        saveProjects();
        renderProjects();
      });
    });
  }

  // Mobile: drag reorder project cards
  if(isMobile){
    let mobDragIdx = null;
    const cards = canvas.querySelectorAll('.project-col');
    cards.forEach((card,i)=>{
      card.setAttribute('draggable','true');
      const hdr = card.querySelector('.project-header');
      // Only start drag from header
      card.addEventListener('dragstart', e=>{
        if(!e.target.closest('.project-header')) { e.preventDefault(); return; }
        mobDragIdx = i;
        card.classList.add('mobile-dragging');
        e.dataTransfer.effectAllowed='move';
        e.dataTransfer.setData('text/plain',i);
      });
      card.addEventListener('dragend', ()=>{
        card.classList.remove('mobile-dragging');
        cards.forEach(c=>{c.classList.remove('mobile-drag-above');c.classList.remove('mobile-drag-below')});
        mobDragIdx=null;
      });
      card.addEventListener('dragover', e=>{
        e.preventDefault();
        if(mobDragIdx===null||mobDragIdx===i) return;
        cards.forEach(c=>{c.classList.remove('mobile-drag-above');c.classList.remove('mobile-drag-below')});
        if(i<mobDragIdx) card.classList.add('mobile-drag-above');
        else card.classList.add('mobile-drag-below');
      });
      card.addEventListener('dragleave', ()=>{
        card.classList.remove('mobile-drag-above');card.classList.remove('mobile-drag-below');
      });
      card.addEventListener('drop', e=>{
        e.preventDefault();
        if(mobDragIdx===null||mobDragIdx===i) return;
        const moved = projects.splice(mobDragIdx,1)[0];
        projects.splice(i,0,moved);
        saveProjects();
        renderProjects();
      });
    });
  }

  // Checkboxes
  document.querySelectorAll('.task-checkbox').forEach(cb=>{
    cb.addEventListener('change', e=>{
      const pi=+e.target.dataset.pi, ti=+e.target.dataset.ti;
      projects[pi].tasks[ti].done = e.target.checked;
      saveProjects();
      renderProjects();
      renderToday();
    });
  });
  // Delete task
  document.querySelectorAll('.task-delete').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const pi=+e.target.dataset.pi, ti=+e.target.dataset.ti;
      projects[pi].tasks.splice(ti,1);
      saveProjects();
      renderProjects();
      renderToday();
    });
  });
  // Add task inputs
  document.querySelectorAll('.add-task-input').forEach(inp=>{
    inp.addEventListener('keydown', e=>{
      if(e.key==='Enter'){
        const text=inp.value.trim();
        if(!text)return;
        const pi=+inp.dataset.pi;
        projects[pi].tasks.push({id:uid(),text,done:false,priority:null});
        saveProjects();
        renderProjects();
        renderToday();
        const newInp = document.querySelector(`.add-task-input[data-pi="${pi}"]`);
        if(newInp) newInp.focus();
      }
    });
    // Prevent canvas pan when typing
    inp.addEventListener('pointerdown', e=>e.stopPropagation());
  });
  // Delete project
  document.querySelectorAll('.btn-delete-project').forEach(btn=>{
    btn.addEventListener('click', e=>{
      const pi=+e.target.dataset.pi;
      if(confirm(`Delete "${projects[pi].name}"?`)){
        projects.splice(pi,1);
        saveProjects();
        renderProjects();
        renderToday();
      }
    });
  });

  // Priority dots - click to set, then dots disappear (re-render)
  document.querySelectorAll('.priority-dot').forEach(dot=>{
    dot.addEventListener('click', e=>{
      e.stopPropagation();
      const pi=+dot.dataset.pi, ti=+dot.dataset.ti, p=dot.dataset.p;
      projects[pi].tasks[ti].priority = p;
      saveProjects();
      renderProjects();
      renderToday();
    });
  });

  // Click priority indicator to clear priority
  document.querySelectorAll('.task-priority-indicator').forEach(ind=>{
    const item = ind.closest('.task-item');
    const pi=+item.dataset.pi, ti=+item.dataset.ti;
    ind.style.cursor='pointer';
    ind.title='Click to clear priority';
    ind.addEventListener('click', e=>{
      e.stopPropagation();
      projects[pi].tasks[ti].priority = null;
      saveProjects();
      renderProjects();
      renderToday();
    });
  });

  // Minimize toggle
  document.querySelectorAll('.btn-minimize').forEach(btn=>{
    btn.addEventListener('click', e=>{
      e.stopPropagation();
      const pi=+btn.dataset.pi;
      projects[pi].collapsed = !projects[pi].collapsed;
      saveProjects();
      renderProjects();
    });
  });

  // Color dot -> open global popover
  const gPop = document.getElementById('globalPopover');
  document.querySelectorAll('.color-dot').forEach(dot=>{
    dot.addEventListener('click', e=>{
      e.stopPropagation();
      const pi = +dot.dataset.pi;
      const proj = projects[pi];
      const wasOpen = gPop.classList.contains('active') && gPop.dataset.pi === ''+pi;
      gPop.classList.remove('active');
      if(wasOpen) return;
      gPop.dataset.pi = pi;
      gPop.innerHTML = `
        <div class="pop-label">COLOR</div>
        ${PALETTE.map(c=>`<div class="color-swatch" data-color="${c}" style="background:${c}"></div>`).join('')}
        <div class="pop-label">BACKGROUND</div>
        <div class="bg-crazy ${proj.bg==='crazy'?'active-bg':''}" data-bg="crazy" title="PASSIONATE"></div>
        ${BG_PALETTE.map(c=>`<div class="bg-swatch ${(proj.bg||'#111111')===c?'active-bg':''}" data-bg="${c}" style="background:${c}"></div>`).join('')}
      `;
      gPop.style.left = e.clientX + 'px';
      gPop.style.top = (e.clientY + 14) + 'px';
      gPop.classList.add('active');
      requestAnimationFrame(()=>{
        const pr = gPop.getBoundingClientRect();
        if(pr.right > window.innerWidth) gPop.style.left = (window.innerWidth - pr.width - 8) + 'px';
        if(pr.bottom > window.innerHeight) gPop.style.top = (e.clientY - pr.height - 8) + 'px';
      });
      // Color swatches
      gPop.querySelectorAll('.color-swatch').forEach(sw=>{
        sw.addEventListener('click', ev=>{
          ev.stopPropagation();
          projects[pi].color = sw.dataset.color;
          saveProjects(); gPop.classList.remove('active'); renderProjects();
        });
      });
      // Bg swatches
      gPop.querySelectorAll('.bg-swatch, .bg-crazy').forEach(sw=>{
        sw.addEventListener('click', ev=>{
          ev.stopPropagation();
          projects[pi].bg = sw.dataset.bg;
          saveProjects(); gPop.classList.remove('active'); renderProjects();
        });
      });
    });
  });
  document.addEventListener('click',()=>{ gPop.classList.remove('active'); });
}

// ---- AI NODE EDITOR ----
const aiCanvasWrap = document.getElementById('aiCanvasWrap');
const aiCanvas = document.getElementById('aiCanvas');
const aiWires = document.getElementById('aiWires');

const NODE_DEFS = {
  prompt:       {title:'Prompt', inputs:[], outputs:[{name:'text', type:'text'}]},
  upload_image: {title:'Image In', inputs:[], outputs:[{name:'image', type:'image'}]},
  image_model:  {title:'Nano Banana Pro', inputs:[{name:'prompt', type:'text'},{name:'ref', type:'image'}], outputs:[{name:'image', type:'image'}]},
  video_model:  {title:'Seedance 2.0', inputs:[{name:'prompt', type:'text'},{name:'ref', type:'image'}], outputs:[{name:'video', type:'video'}]},
  image_output: {title:'Image Output', inputs:[{name:'image', type:'image'}], outputs:[]},
  video_output: {title:'Video Output', inputs:[{name:'video', type:'video'}], outputs:[]},
};

let aiNodes = JSON.parse(localStorage.getItem('accion_ai_nodes') || '[]');
let aiConns = JSON.parse(localStorage.getItem('accion_ai_conns') || '[]');
let aiPan = JSON.parse(localStorage.getItem('accion_ai_pan') || '{"x":0,"y":0,"z":1}');
let aiNodeId = 1;
aiNodes.forEach(n => { if(n.id >= aiNodeId) aiNodeId = n.id + 1; });

function saveAi(){
  localStorage.setItem('accion_ai_nodes', JSON.stringify(aiNodes));
  localStorage.setItem('accion_ai_conns', JSON.stringify(aiConns));
}
function saveAiPan(){
  localStorage.setItem('accion_ai_pan', JSON.stringify(aiPan));
}
function updateAiTransform(){
  aiCanvas.style.transform = `translate(${aiPan.x}px,${aiPan.y}px) scale(${aiPan.z})`;
  renderAiWires();
}

function addAiNode(type, x, y){
  const def = NODE_DEFS[type];
  if(!def) return;
  const node = {
    id: aiNodeId++,
    type,
    x: x ?? (200 - aiPan.x)/aiPan.z,
    y: y ?? (200 - aiPan.y)/aiPan.z,
    data: { prompt: '' }
  };
  aiNodes.push(node);
  saveAi();
  renderAi();
}

function deleteAiNode(id){
  aiNodes = aiNodes.filter(n => n.id !== id);
  aiConns = aiConns.filter(c => c.from.node !== id && c.to.node !== id);
  saveAi();
  renderAi();
}

function renderAi(){
  aiCanvas.querySelectorAll('.ai-node').forEach(el => el.remove());
  aiNodes.forEach(node => {
    const def = NODE_DEFS[node.type];
    const el = document.createElement('div');
    el.className = 'ai-node type-' + node.type;
    el.dataset.id = node.id;
    el.style.left = node.x + 'px';
    el.style.top = node.y + 'px';

    let bodyHtml = '';
    if(node.type === 'prompt'){
      bodyHtml = `<textarea class="ai-node-prompt" placeholder="describe...">${esc(node.data.prompt||'')}</textarea>`;
    } else if(node.type === 'upload_image'){
      bodyHtml = `<div class="ai-node-preview">${node.data.src?`<img src="${node.data.src}">`:'click to upload'}</div>`;
    } else if(node.type === 'image_model'){
      bodyHtml = `<div class="ai-node-info">Gemini 2.5 Flash Image<br><b>resolution:</b> 1024&times;1024</div><button class="ai-node-run">Run</button>`;
    } else if(node.type === 'video_model'){
      bodyHtml = `<div class="ai-node-info">ByteDance Seedance 2.0<br><b>duration:</b> 5s &middot; <b>res:</b> 1080p</div><button class="ai-node-run">Run</button>`;
    } else if(node.type === 'image_output'){
      bodyHtml = `<div class="ai-node-preview">${node.data.src?`<img src="${node.data.src}">`:'awaiting image'}</div>`;
    } else if(node.type === 'video_output'){
      bodyHtml = `<div class="ai-node-preview">${node.data.src?`<video src="${node.data.src}" controls></video>`:'awaiting video'}</div>`;
    }

    el.innerHTML = `
      <div class="ai-node-header">
        <span class="ai-node-title">${def.title}</span>
        <button class="ai-node-del" data-del="${node.id}">&times;</button>
      </div>
      <div class="ai-node-body">${bodyHtml}</div>
    `;

    // Ports - positioned vertically
    const portSpacing = 22;
    def.inputs.forEach((p, i) => {
      const port = document.createElement('div');
      port.className = 'ai-port input type-' + p.type;
      port.dataset.node = node.id;
      port.dataset.port = p.name;
      port.dataset.dir = 'in';
      port.dataset.ptype = p.type;
      port.style.top = (44 + i*portSpacing) + 'px';
      port.innerHTML = `<span class="ai-port-label">${p.name}</span>`;
      el.appendChild(port);
    });
    def.outputs.forEach((p, i) => {
      const port = document.createElement('div');
      port.className = 'ai-port output type-' + p.type;
      port.dataset.node = node.id;
      port.dataset.port = p.name;
      port.dataset.dir = 'out';
      port.dataset.ptype = p.type;
      port.style.top = (44 + i*portSpacing) + 'px';
      port.innerHTML = `<span class="ai-port-label">${p.name}</span>`;
      el.appendChild(port);
    });

    aiCanvas.appendChild(el);
  });

  // Attach node interactions
  aiCanvas.querySelectorAll('.ai-node').forEach(el => {
    const id = +el.dataset.id;
    const node = aiNodes.find(n => n.id === id);
    const hdr = el.querySelector('.ai-node-header');

    // Drag node
    hdr.addEventListener('pointerdown', e => {
      if(e.target.closest('.ai-node-del, .ai-port')) return;
      e.stopPropagation();
      el.classList.add('dragging');
      const startX = e.clientX, startY = e.clientY;
      const startNX = node.x, startNY = node.y;
      const onMove = ev => {
        node.x = startNX + (ev.clientX - startX) / aiPan.z;
        node.y = startNY + (ev.clientY - startY) / aiPan.z;
        el.style.left = node.x + 'px';
        el.style.top = node.y + 'px';
        renderAiWires();
      };
      const onUp = () => {
        el.classList.remove('dragging');
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        saveAi();
      };
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
    });

    // Delete
    el.querySelector('.ai-node-del')?.addEventListener('click', e => {
      e.stopPropagation();
      deleteAiNode(id);
    });

    // Prompt input
    const ta = el.querySelector('.ai-node-prompt');
    if(ta){
      ta.addEventListener('input', () => { node.data.prompt = ta.value; saveAi(); });
      ta.addEventListener('pointerdown', e => e.stopPropagation());
    }

    // Upload image
    if(node.type === 'upload_image'){
      const preview = el.querySelector('.ai-node-preview');
      preview.style.cursor = 'pointer';
      preview.addEventListener('click', () => {
        const inp = document.createElement('input');
        inp.type = 'file'; inp.accept = 'image/*';
        inp.onchange = e => {
          const f = e.target.files[0]; if(!f) return;
          const r = new FileReader();
          r.onload = ev => { node.data.src = ev.target.result; saveAi(); renderAi(); };
          r.readAsDataURL(f);
        };
        inp.click();
      });
    }

    // Run button (placeholder - shows pending state)
    const runBtn = el.querySelector('.ai-node-run');
    if(runBtn){
      runBtn.addEventListener('click', e => {
        e.stopPropagation();
        runBtn.textContent = 'Running...';
        runBtn.disabled = true;
        setTimeout(() => {
          runBtn.textContent = 'Run';
          runBtn.disabled = false;
          alert('API not connected yet — this is a preview of the node system.');
        }, 800);
      });
    }

    // Port drag to create connection
    el.querySelectorAll('.ai-port').forEach(port => {
      port.addEventListener('pointerdown', e => {
        e.stopPropagation();
        startWireDrag(port, e);
      });
    });
  });

  renderAiWires();
}

function getPortPos(nodeId, portName, dir){
  const port = aiCanvas.querySelector(`.ai-port[data-node="${nodeId}"][data-port="${portName}"][data-dir="${dir}"]`);
  if(!port) return null;
  const node = port.closest('.ai-node');
  const nx = parseFloat(node.style.left), ny = parseFloat(node.style.top);
  const px = port.offsetLeft + 7;
  const py = port.offsetTop + 7;
  return { x: nx + px, y: ny + py };
}

function renderAiWires(){
  // Get canvas size to compute viewBox
  const rect = aiCanvasWrap.getBoundingClientRect();
  aiWires.setAttribute('width', rect.width);
  aiWires.setAttribute('height', rect.height);
  aiWires.innerHTML = '';
  // Add a transform group to match canvas pan/zoom
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('transform', `translate(${aiPan.x},${aiPan.y}) scale(${aiPan.z})`);
  aiConns.forEach(c => {
    const a = getPortPos(c.from.node, c.from.port, 'out');
    const b = getPortPos(c.to.node, c.to.port, 'in');
    if(!a || !b) return;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    const dx = Math.abs(b.x - a.x) * 0.5;
    path.setAttribute('d', `M ${a.x} ${a.y} C ${a.x+dx} ${a.y}, ${b.x-dx} ${b.y}, ${b.x} ${b.y}`);
    path.setAttribute('class', 'ai-wire ' + (c.type||''));
    g.appendChild(path);
  });
  aiWires.appendChild(g);
}

let dragWire = null;
function startWireDrag(port, e){
  const fromDir = port.dataset.dir;
  const fromNode = +port.dataset.node;
  const fromPort = port.dataset.port;
  const fromType = port.dataset.ptype;
  const startPos = getPortPos(fromNode, fromPort, fromDir);

  const tempG = document.createElementNS('http://www.w3.org/2000/svg','g');
  tempG.setAttribute('transform', `translate(${aiPan.x},${aiPan.y}) scale(${aiPan.z})`);
  const tempPath = document.createElementNS('http://www.w3.org/2000/svg','path');
  tempPath.setAttribute('class', 'ai-wire ai-wire-temp ' + fromType);
  tempG.appendChild(tempPath);
  aiWires.appendChild(tempG);

  const onMove = ev => {
    const wrapRect = aiCanvasWrap.getBoundingClientRect();
    const mx = (ev.clientX - wrapRect.left - aiPan.x) / aiPan.z;
    const my = (ev.clientY - wrapRect.top - aiPan.y) / aiPan.z;
    const a = fromDir === 'out' ? startPos : {x:mx,y:my};
    const b = fromDir === 'out' ? {x:mx,y:my} : startPos;
    const dx = Math.abs(b.x - a.x) * 0.5;
    tempPath.setAttribute('d', `M ${a.x} ${a.y} C ${a.x+dx} ${a.y}, ${b.x-dx} ${b.y}, ${b.x} ${b.y}`);
  };
  const onUp = ev => {
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    tempG.remove();
    // Check if dropped on a compatible port
    const target = document.elementFromPoint(ev.clientX, ev.clientY);
    const targetPort = target?.closest('.ai-port');
    if(targetPort && targetPort !== port){
      const tDir = targetPort.dataset.dir;
      const tType = targetPort.dataset.ptype;
      const tNode = +targetPort.dataset.node;
      const tPort = targetPort.dataset.port;
      if(tDir !== fromDir && tType === fromType){
        const conn = fromDir === 'out'
          ? { from:{node:fromNode,port:fromPort}, to:{node:tNode,port:tPort}, type:fromType }
          : { from:{node:tNode,port:tPort}, to:{node:fromNode,port:fromPort}, type:fromType };
        // Remove existing connection to same input
        aiConns = aiConns.filter(c => !(c.to.node === conn.to.node && c.to.port === conn.to.port));
        aiConns.push(conn);
        saveAi();
        renderAiWires();
      }
    }
  };
  document.addEventListener('pointermove', onMove);
  document.addEventListener('pointerup', onUp);
}

// Pan AI canvas
let aiPanning = false, aiPanStartX, aiPanStartY;
aiCanvasWrap.addEventListener('pointerdown', e => {
  if(e.target === aiCanvasWrap || e.target === aiCanvas || e.target === aiWires){
    aiPanning = true;
    aiPanStartX = e.clientX - aiPan.x;
    aiPanStartY = e.clientY - aiPan.y;
    aiCanvasWrap.classList.add('panning');
  }
});
aiCanvasWrap.addEventListener('pointermove', e => {
  if(!aiPanning) return;
  aiPan.x = e.clientX - aiPanStartX;
  aiPan.y = e.clientY - aiPanStartY;
  updateAiTransform();
});
aiCanvasWrap.addEventListener('pointerup', () => {
  if(aiPanning){ aiPanning = false; aiCanvasWrap.classList.remove('panning'); saveAiPan(); }
});
aiCanvasWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.92 : 1.08;
  const newZoom = Math.max(0.3, Math.min(2.5, aiPan.z * delta));
  const wrapRect = aiCanvasWrap.getBoundingClientRect();
  const mx = e.clientX - wrapRect.left;
  const my = e.clientY - wrapRect.top;
  aiPan.x = mx - (mx - aiPan.x) * (newZoom / aiPan.z);
  aiPan.y = my - (my - aiPan.y) * (newZoom / aiPan.z);
  aiPan.z = newZoom;
  updateAiTransform();
  saveAiPan();
}, {passive: false});

window.addEventListener('resize', renderAiWires);

    cloudUnsub = fbDb.collection('users').doc(u.uid).onSnapshot(snap=>{
      if(!snap.exists){
        pushToCloud();
        return;
      }
      if(snap.metadata.hasPendingWrites) return;
      const data = snap.data();
      isApplyingRemote = true;
      if(Array.isArray(data.projects)){
        projects = data.projects;
        localStorage.setItem('accion_projects', JSON.stringify(projects));
      }
      if(data.workouts && typeof data.workouts === 'object'){
        workouts = data.workouts;
        localStorage.setItem('accion_workouts', JSON.stringify(workouts));
      }
      isApplyingRemote = false;
      render();
    }, err=>console.error('cloud snapshot',err));
  } else {
    if(cloudUnsub){ cloudUnsub(); cloudUnsub=null; }
  }
});

// ---- PICTURE-IN-PICTURE (Always on top) ----
let pipWindow = null;
let pipInterval = null;

document.getElementById('btnPip').addEventListener('click', async ()=>{
  // Document PiP API (Chrome 116+)
  if('documentPictureInPicture' in window){
    try {
      pipWindow = await documentPictureInPicture.requestWindow({
        width: 320,
        height: 400,
      });
      buildPipContent();
      // Sync every 500ms
      pipInterval = setInterval(()=>{ if(pipWindow && !pipWindow.closed) updatePipContent(); else clearInterval(pipInterval); }, 500);
      pipWindow.addEventListener('pagehide', ()=>{ clearInterval(pipInterval); pipWindow=null; });
    } catch(err){
      console.error('PiP error:', err);
      fallbackPopup();
    }
  } else {
    fallbackPopup();
  }
});

function buildPipContent(){
  if(!pipWindow) return;
  const doc = pipWindow.document;
  doc.head.innerHTML = `
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');
      *{box-sizing:border-box;margin:0;padding:0}
      body{
        font-family:'JetBrains Mono',Consolas,monospace;
        background:#0a0a0a;color:#e5e5e5;font-size:12px;line-height:1.5;
        padding:12px;overflow-y:auto;
      }

      .pip-count{font-size:10px;color:#888}
      .pip-section{margin-bottom:12px}
      .pip-project{font-size:10px;font-weight:500;letter-spacing:1px;margin:8px 0 4px;padding-left:2px}
      .pip-task{display:flex;align-items:center;gap:6px;padding:3px 2px;font-size:11px;border-radius:3px}
      .pip-task.done span{text-decoration:line-through;opacity:.35;color:#888}
      .pip-drag{cursor:grab;color:#555;font-size:9px;opacity:0;transition:opacity .1s;user-select:none;flex-shrink:0}
      .pip-task:hover .pip-drag{opacity:1}
      .pip-task.pip-dragging{opacity:.4}
      .pip-task.pip-above{box-shadow:0 -1px 0 0 #3b82f6}
      .pip-task.pip-below{box-shadow:0 1px 0 0 #3b82f6}
      .pip-cb{
        appearance:none;-webkit-appearance:none;width:12px;height:12px;min-width:12px;
        border:1px solid #444;border-radius:2px;cursor:pointer;
        background:transparent;position:relative;flex-shrink:0;
      }
      .pip-cb:checked{background:#3b82f6;border-color:#3b82f6}
      .pip-cb:checked::after{
        content:'';position:absolute;top:0px;left:3px;width:3px;height:6px;
        border:solid #fff;border-width:0 1.5px 1.5px 0;transform:rotate(45deg);
      }
      .pip-empty{color:#555;font-size:11px;text-align:center;padding:30px 0}
    </style>
  `;
  doc.body.innerHTML = '<div id="pip-root"></div>';
  updatePipContent();
}

function updatePipContent(){
  if(!pipWindow || pipWindow.closed) return;
  const root = pipWindow.document.getElementById('pip-root');
  if(!root) return;

  // Collect today items, use todayOrder for sorting
  const rawItems = [];
  projects.forEach((proj,pi)=>{
    proj.tasks.forEach((t,ti)=>{
      if(t.priority==='today' && !t.done){
        const key = pi+'-'+ti;
        rawItems.push({key,text:t.text,pi,ti,projName:proj.name,projColor:proj.color});
      }
    });
  });

  // Sort by todayOrder
  const keyMap = {};
  rawItems.forEach(i=>keyMap[i.key]=i);
  const ordered = todayOrder.map(k=>keyMap[k]).filter(Boolean);
  // Append any not in order
  rawItems.forEach(i=>{ if(!todayOrder.includes(i.key)) ordered.push(i); });
  const items = ordered;

  const todayCount = items.length;
  let html = `
    <div class="pip-header">
      <span class="pip-title">TODAY</span>
      <span class="pip-count">${todayCount} task${todayCount!==1?'s':''}</span>
    </div>
  `;

  if(!todayCount){
    html += '<div class="pip-empty">nothing for today</div>';
  } else {
    items.forEach((it,idx)=>{
      html += `<div class="pip-task" data-idx="${idx}" draggable="true">
        <span class="pip-drag">&#8942;</span>
        <input type="checkbox" class="pip-cb" data-pi="${it.pi}" data-ti="${it.ti}">
        <span>${esc(it.text)}</span>
        <span style="font-size:9px;color:${it.projColor};margin-left:auto;flex-shrink:0">${esc(it.projName)}</span>
      </div>`;
    });
  }

  root.innerHTML = html;

  // Checkbox events
  root.querySelectorAll('.pip-cb').forEach(cb=>{
    cb.addEventListener('change', e=>{
      const pi=+cb.dataset.pi, ti=+cb.dataset.ti;
      projects[pi].tasks[ti].done = cb.checked;
      saveProjects();
      renderProjects();
      renderToday();
      updatePipContent();
    });
  });

  // Drag reorder in PiP
  let pipDragFrom = null;
  const pipRows = root.querySelectorAll('.pip-task');
  pipRows.forEach(row=>{
    row.addEventListener('dragstart',e=>{
      pipDragFrom = +row.dataset.idx;
      row.classList.add('pip-dragging');
      e.dataTransfer.effectAllowed='move';
    });
    row.addEventListener('dragend',()=>{
      row.classList.remove('pip-dragging');
      pipRows.forEach(r=>{r.classList.remove('pip-above');r.classList.remove('pip-below')});
      pipDragFrom=null;
    });
    row.addEventListener('dragover',e=>{
      e.preventDefault();
      if(pipDragFrom===null) return;
      const idx=+row.dataset.idx;
      pipRows.forEach(r=>{r.classList.remove('pip-above');r.classList.remove('pip-below')});
      if(idx<pipDragFrom) row.classList.add('pip-above');
      else if(idx>pipDragFrom) row.classList.add('pip-below');
    });
    row.addEventListener('dragleave',()=>{
      row.classList.remove('pip-above');row.classList.remove('pip-below');
    });
    row.addEventListener('drop',e=>{
      e.preventDefault();
      const toIdx=+row.dataset.idx;
      if(pipDragFrom===null||pipDragFrom===toIdx) return;
      // Reorder todayOrder using the items' keys
      const fromKey = items[pipDragFrom].key;
      const toKey = items[toIdx].key;
      const fromOI = todayOrder.indexOf(fromKey);
      const toOI = todayOrder.indexOf(toKey);
      if(fromOI>-1){
        todayOrder.splice(fromOI,1);
        const newToOI = todayOrder.indexOf(toKey);
        todayOrder.splice(newToOI>=0?newToOI:toOI,0,fromKey);
        saveTodayOrder();
      }
      renderToday();
      updatePipContent();
    });
  });
}
